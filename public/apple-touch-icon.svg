<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#f5f0eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="6" y="6" width="168" height="168" rx="32" fill="none" stroke="#b08968" stroke-width="1.5" opacity="0.4"/>

  <!-- Monogram -->
  <text x="90" y="105" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="56" fill="#b08968" font-weight="400">A</text>
  <text x="90" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#b08968" opacity="0.6" dx="0" dy="-5">&amp;</text>
  <text x="90" y="105" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="56" fill="#b08968" font-weight="400" dx="48">K</text>

  <!-- Small decorative dot -->
  <circle cx="90" cy="130" r="2.5" fill="#b08968" opacity="0.5"/>
</svg>
