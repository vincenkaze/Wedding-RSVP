<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#f5f0eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="9" fill="none" stroke="#b08968" stroke-width="1" opacity="0.4"/>

  <!-- Monogram -->
  <text x="24" y="29" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="15" fill="#b08968" font-weight="400">A</text>
  <text x="24" y="29" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#b08968" opacity="0.6" dy="-3">&amp;</text>
  <text x="24" y="29" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="15" fill="#b08968" font-weight="400" dx="13">K</text>

  <!-- Dot -->
  <circle cx="24" cy="37" r="1.2" fill="#b08968" opacity="0.5"/>
</svg>
